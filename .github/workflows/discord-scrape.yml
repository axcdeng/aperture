name: discord-scrape

on:
  schedule:
    # Every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      backfill_before_message_id:
        description: 'Optional: Discord message snowflake to begin a backwards backfill from (paginates older messages).'
        required: false
        default: ''

concurrency:
  group: discord-scrape
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json
      - name: Install
        working-directory: scripts
        run: npm ci || npm install
      - name: Routine scrape
        if: ${{ inputs.backfill_before_message_id == '' }}
        working-directory: scripts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DISCORD_USER_TOKEN: ${{ secrets.DISCORD_USER_TOKEN }}
        run: npm run scrape
      - name: Backfill (manual run only)
        if: ${{ inputs.backfill_before_message_id != '' }}
        working-directory: scripts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DISCORD_USER_TOKEN: ${{ secrets.DISCORD_USER_TOKEN }}
          BACKFILL_BEFORE_MESSAGE_ID: ${{ inputs.backfill_before_message_id }}
        run: npm run backfill
